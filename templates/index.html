<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Media Fetcher</title>
    <style>
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --bg: #0F172A;
            --card-bg: #1E293B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border: #334155;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
        }

        .card {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-sizing: border-box;
        }

        h2 { margin: 0 0 10px 0; font-weight: 600; letter-spacing: -0.5px; }
        p { color: var(--text-muted); font-size: 14px; margin: 0 0 25px 0; }

        input[type="url"] {
            width: 100%;
            padding: 14px;
            background-color: #0F172A;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            color: white;
            box-sizing: border-box;
            margin-bottom: 15px;
            transition: border-color 0.2s;
        }

        input[type="url"]:focus { outline: none; border-color: var(--primary); }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #475569; color: #94A3B8; cursor: not-allowed; }

        .progress-wrapper { display: none; margin-top: 25px; text-align: left; }
        .status-text { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; display: block; }
        
        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background-color: #334155;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.2s ease-out;
        }

        .error-msg { color: #EF4444; margin-top: 15px; font-size: 13px; display: none; text-align: left; background: #451A1A; padding: 10px; border-radius: 4px; border: 1px solid #7F1D1D;}
    </style>
</head>
<body>

    <div class="card">
        <h2>Audio Cloud Pipeline</h2>
        <p>Extract links directly into your unified remote repository</p>
        
        <form id="download-form">
            <input type="url" id="url_input" placeholder="Paste media stream link..." required autofocus>
            <button type="submit" id="submit-btn">Run Engine Pipeline</button>
        </form>

        <div class="progress-wrapper" id="progress-wrapper">
            <span class="status-text" id="status-text">Ready...</span>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="error-msg" id="error-msg"></div>
    </div>

    <script>
        document.getElementById('download-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const urlInput = document.getElementById('url_input').value;
            const btn = document.getElementById('submit-btn');
            const progressWrapper = document.getElementById('progress-wrapper');
            const progressFill = document.getElementById('progress-fill');
            const statusText = document.getElementById('status-text');
            const errorMsg = document.getElementById('error-msg');

            // Setup display state
            errorMsg.style.display = 'none';
            progressWrapper.style.display = 'block';
            btn.disabled = true;
            progressFill.style.width = '0%';
            statusText.innerText = 'Initializing application runtime...';

            try {
                const formData = new FormData();
                formData.append('url_input', urlInput);

                // Use fetch to process chunked text pipeline
                const response = await fetch('/process', { method: 'POST', body: formData });
                if (!response.ok) throw new Error("Server route execution failure.");

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let leftoverBuffer = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    // Read chunk block text and split line by line
                    leftoverBuffer += decoder.decode(value, { stream: true });
                    const lines = leftoverBuffer.split("\n");
                    leftoverBuffer = lines.pop(); // Save incomplete line fragments if any

                    for (const line of lines) {
                        if (!line.trim()) continue;
                        
                        const payload = JSON.parse(line);

                        if (payload.type === 'status') {
                            statusText.innerText = payload.stage;
                        } 
                        else if (payload.type === 'progress') {
                            statusText.innerText = payload.stage;
                            progressFill.style.width = payload.percent + '%';
                        } 
                        else if (payload.type === 'error') {
                            throw new Error(payload.message);
                        } 
                        else if (payload.type === 'final') {
                            // Perfect execution target reached. Handle structural download injection.
                            statusText.innerText = "Pipeline complete! Compiling manifest metadata.";
                            progressFill.style.width = '100%';

                            const blob = new Blob([JSON.stringify(payload.data, null, 4)], { type: "application/json" });
                            const linkUrl = window.URL.createObjectURL(blob);
                            const downloadTrigger = document.createElement('a');
                            downloadTrigger.href = linkUrl;
                            downloadTrigger.download = "song_data.json";
                            document.body.appendChild(downloadTrigger);
                            downloadTrigger.click();
                            downloadTrigger.remove();
                            window.URL.revokeObjectURL(linkUrl);
                        }
                    }
                }

                setTimeout(() => {
                    progressWrapper.style.display = 'none';
                    btn.disabled = false;
                    document.getElementById('download-form').reset();
                }, 1500);

            } catch (err) {
                progressWrapper.style.display = 'none';
                errorMsg.innerText = "Pipeline Execution Exception: " + err.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
            }
        });
    </script>

</body>
</html>
